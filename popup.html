<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAT Helper</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #edf3f8;
        --panel: #ffffff;
        --border: #d6dee8;
        --text: #152232;
        --muted: #607086;
        --accent: #0b5bd3;
        --accent-strong: #083f93;
        --soft: #e8f0ff;
        --danger: #c03b3b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        font: 13px/1.4 "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(11, 91, 211, 0.15), transparent 36%),
          linear-gradient(180deg, #f6faff 0%, var(--bg) 100%);
      }

      .popup {
        padding: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 12px 30px rgba(21, 34, 50, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      .subtle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: var(--soft);
      }

      .toggle-copy strong,
      .section h2 {
        display: block;
        font-size: 13px;
        margin: 0;
      }

      .toggle-copy span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 54px;
        height: 30px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #c2cfde;
        transition: 0.2s ease;
        cursor: pointer;
      }

      .slider::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 3px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        transition: 0.2s ease;
      }

      .switch input:checked + .slider {
        background: var(--accent);
      }

      .switch input:checked + .slider::before {
        transform: translateX(24px);
      }

      .section {
        margin-top: 14px;
      }

      .range-grid,
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 600;
      }

      input[type="number"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fbfdff;
        color: var(--text);
        font: inherit;
      }

      .actions {
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .secondary {
        background: #edf3f8;
        color: var(--text);
      }

      .secondary:hover {
        background: #e0e8f1;
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .status.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <div class="panel">
        <h1>DAT One Helper</h1>
        <p class="subtle">Filters use price, calculated RPM, and trip miles only.</p>

        <div class="toggle-row">
          <div class="toggle-copy">
            <strong>Extension state</strong>
            <span id="toggleStatus">Loading...</span>
          </div>
          <label class="switch" aria-label="Toggle extension">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="section">
          <h2>Price Range</h2>
          <div class="range-grid">
            <div>
              <label for="minPrice">Min price</label>
              <input id="minPrice" type="number" min="0" step="1" placeholder="Any" />
            </div>
            <div>
              <label for="maxPrice">Max price</label>
              <input id="maxPrice" type="number" min="0" step="1" placeholder="Any" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>RPM Range</h2>
          <div class="range-grid">
            <div>
              <label for="minRpm">Min RPM</label>
              <input id="minRpm" type="number" min="0" step="0.01" placeholder="Any" />
            </div>
            <div>
              <label for="maxRpm">Max RPM</label>
              <input id="maxRpm" type="number" min="0" step="0.01" placeholder="Any" />
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Trip Miles Range</h2>
          <div class="range-grid">
            <div>
              <label for="minTripMiles">Min trip miles</label>
              <input id="minTripMiles" type="number" min="0" step="1" placeholder="Any" />
            </div>
            <div>
              <label for="maxTripMiles">Max trip miles</label>
              <input id="maxTripMiles" type="number" min="0" step="1" placeholder="Any" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="applyButton" class="primary" type="button">Apply Filters</button>
          <button id="clearButton" class="secondary" type="button">Clear Filters</button>
        </div>

        <div id="statusMessage" class="status" aria-live="polite"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
